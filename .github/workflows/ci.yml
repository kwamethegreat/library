name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Placeholder public env so env.ts's import-time validation passes during
    # lint/typecheck/build. These are NOT secrets -- just schema-satisfying
    # values so the build doesn't fail on missing NEXT_PUBLIC_* vars. Real
    # values live in the deployment platform's env settings.
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_POSTHOG_KEY: ci-posthog-key
      NEXT_PUBLIC_POSTHOG_HOST: https://us.posthog.com
      NEXT_PUBLIC_SENTRY_DSN: ci-sentry-dsn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
